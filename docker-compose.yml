services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: la-backend
    env_file:
      - ./.env
      - ./backend/.env
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: la-frontend
    ports:
      - "${APP_PORT:-35001}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
